#=====================================================================================
# Build FnNAS Image for CDHX-RB30 (RK3399)
# Fork this repo, then run this workflow from GitHub Actions tab
#=====================================================================================

name: Build CDHX-RB30 FnNAS

on:
  workflow_dispatch:
    inputs:
      fnnas_kernel:
        description: "Select kernel version"
        required: false
        default: "6.12.y"
        type: choice
        options:
          - 6.12.y
          - 6.18.y
          - 6.12.y_6.18.y
      auto_kernel:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      rootfs_expand:
        description: "Set rootfs expansion size(GiB)"
        required: false
        default: "16"
      fnnas_url:
        description: "Custom fnnas image download url (leave empty for auto)"
        required: false
        default: ""
      builder_name:
        description: "Set builder signature"
        required: false
        default: "ophub"

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize the build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-make-fnnas-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th

      - name: Download fnnas rockchip base image
        id: down
        working-directory: /builder
        if: (!cancelled())
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          [[ -d "fnnas" ]] || mkdir -p fnnas

          input_url="${{ inputs.fnnas_url }}"

          if [[ -n "${input_url}" ]]; then
              echo "Custom URL detected: ${input_url}"
              clean_url="${input_url%%\?*}"
              regex="github\.com/([^/]+)/([^/]+)/releases/download/([^/]+)/(.+)"
              if [[ "${clean_url}" =~ $regex ]]; then
                  owner="${BASH_REMATCH[1]}"
                  repo="${BASH_REMATCH[2]}"
                  tag="${BASH_REMATCH[3]}"
                  filename="${BASH_REMATCH[4]}"
                  gh release download "${tag}" \
                      --repo "${owner}/${repo}" \
                      --pattern "${filename}" \
                      --dir "fnnas" \
                      --clobber
                  if [[ -f "fnnas/${filename}" ]]; then
                      echo "Download success."
                      echo "status=success" >> ${GITHUB_OUTPUT}
                      exit 0
                  else
                      echo "Error: Download failed."
                      exit 1
                  fi
              else
                  latest_url="${input_url}"
                  fnnas_filename=$(basename "${clean_url}")
              fi
          else
              echo "Auto-detecting latest rockchip base image..."
              latest_version=$(curl -s \
                  -H "Accept: application/vnd.github+json" \
                  -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  https://api.github.com/repos/ophub/fnnas/releases?per_page=20 | \
                  jq -r --arg RTK "fnnas_base_image" \
                  --arg BOARD "rockchip" \
                  '[.[] | select(.tag_name | contains($RTK))] |
                  map(.assets[] | select(.name | contains($BOARD) and endswith(".img.xz"))) |
                  sort_by(.updated_at) |
                  reverse |
                  .[0] |
                  {data: .updated_at, url: .url, name: .name}')

              [[ -z "${latest_version}" || "${latest_version}" == "null" ]] && {
                  echo "Error: Failed to resolve FnNAS image URL."
                  exit 1
              }

              latest_url="$(echo ${latest_version} | jq -r '.url')"
              fnnas_filename="$(echo ${latest_version} | jq -r '.name')"
          fi

          echo "Downloading: ${fnnas_filename}"
          curl -fsSL \
               -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/octet-stream" \
               "${latest_url}" \
               -o "fnnas/${fnnas_filename}"

          [[ "${?}" -ne "0" ]] && echo "Error: Download failed." && exit 1

          ln -sf /builder/fnnas ${{ github.workspace }}/fnnas
          ln -sf /builder/fnnas "/home/runner/work/_actions/${OWNER,,}/fnnas/main/fnnas"

          echo "build_tag=fnnas_cdhx-rb30" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Package FnNAS for CDHX-RB30
        if: ${{ steps.down.outputs.status == 'success' && !cancelled() }}
        uses: ophub/fnnas@main
        with:
          fnnas_path: fnnas/*.img.xz
          fnnas_board: cdhx-rb30
          fnnas_kernel: ${{ inputs.fnnas_kernel }}
          auto_kernel: ${{ inputs.auto_kernel }}
          kernel_repo: ophub/fnnas
          rootfs_expand: ${{ inputs.rootfs_expand }}
          builder_name: ${{ inputs.builder_name }}

      - name: Upload CDHX-RB30 FnNAS to Release
        uses: ncipollo/release-action@main
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag: ${{ env.build_tag }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: false
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## FnNAS for CDHX-RB30 (RK3399)
            - Hardware: Rockchip RK3399, 2GB DDR3, 8GB eMMC, Gigabit Ethernet, WiFi/BT
            - Built from fnnas.com official Arm64 rockchip base image
            - Device tree: rk3399-cdhx-rb30.dtb
            - U-Boot: Mainline u-boot 2023.01 (compiled from cm9vdA/build-linux)

            ### Flash instructions
            1. Write image to SD card using balenaEtcher or dd
            2. Boot from SD card
            3. Run `fnnas-install` to write to eMMC
            4. Run `fnnas-update` for kernel updates
